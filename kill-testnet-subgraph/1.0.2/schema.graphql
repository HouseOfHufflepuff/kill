type Spawned @entity(immutable: true) {
  id: ID!
  agent: Bytes!
  stackId: BigInt!
  units: BigInt!
  reapers: BigInt!
  birthBlock: BigInt!
  block_number: BigInt!
}

type Moved @entity(immutable: true) {
  id: ID!
  agent: Bytes!
  fromStack: BigInt!
  toStack: BigInt!
  units: BigInt!
  reaper: BigInt!
  birthBlock: BigInt!
  block_number: BigInt!
}

type Killed @entity(immutable: true) {
  id: ID!
  attacker: Bytes!
  target: Bytes!
  stackId: BigInt!
  attackerUnitsSent: BigInt!
  attackerReaperSent: BigInt!
  attackerUnitsLost: BigInt!
  attackerReaperLost: BigInt!
  targetUnitsLost: BigInt!
  targetReaperLost: BigInt!
  initialDefenderUnits: BigInt!
  initialDefenderReaper: BigInt!
  attackerBounty: BigInt!
  defenderBounty: BigInt!
  targetBirthBlock: BigInt!
  block_number: BigInt!
}

# Airdrop claim — one per eligible pt1 wallet, free spawn funded by vault.
type Claimed @entity(immutable: true) {
  id: ID!
  claimer: Bytes!
  stackId: BigInt!
  units: BigInt!
  block_number: BigInt!
}

type Stack @entity(immutable: false) {
  id: ID!
  totalStandardUnits: BigInt!
  totalBoostedUnits: BigInt!
  birthBlock: BigInt!
  currentBounty: BigInt!
  active: Boolean!
}

type AgentStack @entity(immutable: false) {
  id: ID!
  agent: Bytes!
  stackId: BigInt!
  birthBlock: BigInt!
  units: BigInt!
  reaper: BigInt!
}

type Agent @entity(immutable: false) {
  id: ID!               # wallet address
  totalSpent: BigInt!
  totalEarned: BigInt!
  netPnL: BigInt!
  lastActiveBlock: BigInt!
  airdropClaimed: Boolean!
}

# Singleton (id: "current") — updated on every ConfigUpdated event.
# FE reads this to compute live bounties and decay without hitting the contract.
type Config @entity(immutable: false) {
  id: ID!                      # always "current"
  spawnCost: BigInt!           # KILL wei per unit
  treasuryBps: BigInt!         # fee taken from bounty payouts (bps)
  maxMultiplier: BigInt!       # bounty/decay multiplier cap
  blocksPerMultiplier: BigInt! # blocks per one multiplier step
  globalCapBps: BigInt!        # max bounty as % of vault (bps)
}

# Singleton (id: "current") — running economy totals, updated on GlobalStats.
# Also mirrors live config params so one query gives FE everything it needs
# to compute bounties and power decay client-side.
type GlobalStat @entity(immutable: false) {
  id: ID!
  totalUnitsKilled: BigInt!
  totalReaperKilled: BigInt!
  killAdded: BigInt!
  killExtracted: BigInt!
  killBurned: BigInt!
  totalPnL: BigInt!
  currentTreasury: BigInt!
  maxBounty: BigInt!
  # Config mirror — kept in sync with Config entity
  spawnCost: BigInt!
  blocksPerMultiplier: BigInt!
  maxMultiplier: BigInt!
  globalCapBps: BigInt!
}
