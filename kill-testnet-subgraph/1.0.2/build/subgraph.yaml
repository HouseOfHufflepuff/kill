specVersion: 0.0.4
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: killgame
    network: base-sepolia
    source:
      address: "0x51D5d36749FD12cf78ca38E39F68Aa4b78a6D28C"
      abi: killgame
      startBlock: 39215199
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Spawned
        - Moved
        - Killed
        - Claimed
        - GlobalStat
        - Stack
        - AgentStack
        - Agent
        - Config
      abis:
        - name: killgame
          file: killgame/killgame.json
      eventHandlers:
        - event: Spawned(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleSpawned
        - event: Moved(indexed address,uint16,uint16,uint256,uint256,uint256)
          handler: handleMoved
        - event: Killed(indexed address,indexed address,indexed
            uint16,(uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256),uint256)
          handler: handleKilled
        - event: GlobalStats(uint256,uint256,uint256,uint256,uint256)
          handler: handleGlobalStats
        - event: ConfigUpdated(uint256,uint256,uint256,uint256,uint256)
          handler: handleConfigUpdated
        - event: Claimed(indexed address,indexed uint16,uint256)
          handler: handleClaimed
      file: killgame/killgame.wasm
