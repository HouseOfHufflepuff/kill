name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run build:mac
          - os: windows-latest
            build_cmd: npm run build:win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: agents/sol/desktop
        run: npm ci

      - name: Build
        working-directory: agents/sol/desktop
        run: ${{ matrix.build_cmd }}

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        working-directory: agents/sol/desktop
        run: |
          for app in dist/mac-arm64/*.app dist/mac/*.app; do
            if [ -d "$app" ]; then
              echo "Signing $app"
              codesign --force --deep --sign - "$app"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            agents/sol/desktop/dist/*.dmg
            agents/sol/desktop/dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
